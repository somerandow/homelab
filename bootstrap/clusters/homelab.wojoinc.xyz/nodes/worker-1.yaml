machine:
  certSANs:
    - 127.0.0.1
    - 10.0.0.7
    - 10.4.0.7
  install:
    wipe: true
    diskSelector:
      uuid: 36363530-5481-1345-0025-385300000002
  systemDiskEncryption:
    ephemeral:
      provider: luks2
      cipher: aes-xts-plain64
      keySize: 256
      keys:
        - tpm: { }
          slot: 1
    state:
      provider: luks2
      cipher: aes-xts-plain64
      keySize: 256
      keys:
        - tpm: { }
          slot: 0
  network:
    searchDomains:
      - wojoinc.xyz
  udev:
    rules:
      - SUBSYSTEM=="tty", KERNEL=="ttyACM*", GROUP="20", MODE="0660"
      - SUBSYSTEM=="tty", KERNEL=="ttyUSB*", GROUP="20", MODE="0660"
---
apiVersion: v1alpha1
kind: HostnameConfig
auto: off
hostname: worker-1
---
apiVersion: v1alpha1
kind: VolumeConfig
name: EPHEMERAL
provisioning:
  diskSelector:
    match: disk.uuid == "36363530-5481-1345-0025-385300000002"
  minSize: 50GB
  maxSize: 200GB
  grow: true
---
apiVersion: v1alpha1
kind: VLANConfig
name: bond0.vlan103
addresses:
  - address: 10.0.0.7/24
routes:
  - gateway: 10.0.0.1
    metric: 1024
---
apiVersion: v1alpha1
kind: VLANConfig
name: bond0.vlan104
addresses:
  - address: 10.4.0.7/16
routes:
  - destination: 10.4.0.0/16

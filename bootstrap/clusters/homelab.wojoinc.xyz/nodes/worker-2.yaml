machine:
  certSANs:
    - 127.0.0.1
    - 10.0.0.8
    - 10.4.0.8
  install:
    wipe: true
    diskSelector:
      uuid: 36363530-5720-1488-0025-384e00000006
  systemDiskEncryption:
    ephemeral:
      provider: luks2
      cipher: aes-xts-plain64
      keySize: 256
      keys:
        - tpm: { }
          slot: 0
    state:
      provider: luks2
      cipher: aes-xts-plain64
      keySize: 256
      keys:
        - tpm: { }
          slot: 0
  network:
    searchDomains:
      - wojoinc.xyz
---
apiVersion: v1alpha1
kind: HostnameConfig
auto: off
hostname: worker-2
---
apiVersion: v1alpha1
kind: VolumeConfig
name: EPHEMERAL
provisioning:
  diskSelector:
    match: disk.uuid == "36363530-5720-1488-0025-384e00000006"
  minSize: 50GB
  maxSize: 200GB
  grow: true
---
apiVersion: v1alpha1
kind: VLANConfig
name: bond0.vlan103
addresses:
  - address: 10.0.0.8/24
routes:
  - gateway: 10.0.0.1
    metric: 1024
---
apiVersion: v1alpha1
kind: VLANConfig
name: bond0.vlan104
addresses:
  - address: 10.4.0.8/16
routes:
  - destination: 10.4.0.0/16
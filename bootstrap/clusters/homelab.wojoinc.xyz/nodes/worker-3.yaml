---
machine:
  certSANs:
    - 127.0.0.1
    - 10.0.0.5
    - 10.4.0.5
  install:
    wipe: true
    diskSelector:
      uuid: 36363530-54b1-0074-0025-384e00000008
  systemDiskEncryption:
    ephemeral:
      provider: luks2
      cipher: aes-xts-plain64
      keySize: 256
      keys:
        - tpm: { }
          slot: 0
    state:
      provider: luks2
      cipher: aes-xts-plain64
      keySize: 256
      keys:
        - tpm: { }
          slot: 0
  network:
    searchDomains:
      - wojoinc.xyz
---
apiVersion: v1alpha1
kind: HostnameConfig
auto: off
hostname: worker-3
---
apiVersion: v1alpha1
kind: VolumeConfig
name: EPHEMERAL
provisioning:
  diskSelector:
    match: disk.uuid == "36363530-54b1-0074-0025-384e00000008"
  minSize: 50GB
  maxSize: 200GB
  grow: true
---
apiVersion: v1alpha1
kind: BondConfig
name: bond0
links:
  - enp3s0f0np0
  - enp3s0f1np1
bondMode: 802.3ad
miimon: 100
updelay: 200
downdelay: 200
xmitHashPolicy: layer2+3
lacpRate: fast
multicast: true
mtu: 9000
---
apiVersion: v1alpha1
kind: VLANConfig
name: bond0.vlan103
addresses:
  - address: 10.0.0.5/24
routes:
  - gateway: 10.0.0.1
---
apiVersion: v1alpha1
kind: VLANConfig
name: bond0.vlan104
addresses:
  - address: 10.4.0.5/16
routes:
  - destination: 10.4.0.0/16
---
apiVersion: v1alpha1
kind: VLANConfig
name: bond0.vlan105
addresses:
  - address: 10.5.0.5/16
routes:
  - destination: 10.5.0.0/16

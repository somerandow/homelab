---
apiVersion: cilium.io/v2
kind: CiliumNodeConfig
metadata:
  name: worker-0
  namespace: kube-system
spec:
  nodeSelector:
    matchLabels:
      kubernetes.io/hostname: worker-0
  defaults:
    devices: "enp87s0,bond0"
    # Allow the use of Kubevirt, which requires MAC addresses be assigned to pods
    # which is not possible with netkit running in L3 mode
    datapath-mode: netkit-l2

---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
patches:
  - target:
      kind: Ingress
    path: patch-ingressclassname.yaml
  - target:
      kind: PersistentVolumeClaim
      annotationSelector: persistence.homelab.wojoinc.xyz/accessMode=RWX
    path: patch-rwx-pvc.yaml
  - target:
      kind: PersistentVolumeClaim
      annotationSelector: persistence.homelab.wojoinc.xyz/accessMode=RWO
    path: patch-rwo-pvc.yaml
  - target:
      kind: GrafanaDashboard
    path: patch-grafanadashboard.yaml
  - target:
      kind: GrafanaDatasource
    path: patch-grafanadatasource.yaml
  - target:
      version: postgresql.cnpg.io/v1
      kind: Cluster
    path: patch-postgres-storageclass.yaml
  - target:
      kind: VaultAuth
    path: patch-vaultauth.yaml
  - target:
      kind: VaultStaticSecret
    path: patch-vaultstaticsecret.yaml
  - target:
      kind: PodMonitor
    path: patch-podmonitor.yaml

injector:
  enabled: false
global:
  tlsDisable: false
server:
  image:
    repository: docker.io/hashicorp/vault
    tag: "2.0.0"
  extraEnvironmentVars:
    VAULT_CAPATH: "/tls/ca.crt"
  updateStrategyType: "OnDelete"
  standalone:
    enabled: false
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 256Mi
      cpu: 500m
  affinity: ""
ui:
  enabled: false

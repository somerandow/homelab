---
redisOperator:
  webhook: true

issuer:
  create: false
  kind: ClusterIssuer
  name: homelab-ca

certmanager:
  enabled: true
  apiVersion: "cert-manager.io/v1"

featureGates:
  GenerateConfigInInitContainer: true

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists

---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: kaneo-db
spec:
  bootstrap:
    initdb:
      database: kaneo
      secret:
        name: kaneo-db-app-user
  monitoring:
    enablePodMonitor: false
  instances: 3
  storage:
    size: 1Gi
# Below commented out until https://github.com/cloudnative-pg/cloudnative-pg/issues/8909 is resolved
#  serviceAccountTemplate:
#    metadata:
#      name: postgres
  postgresql:
    parameters:
      pgaudit.log: "all, -misc"
      pgaudit.log_catalog: "off"
      pgaudit.log_parameter: "on"
      pgaudit.log_relation: "on"

---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: external-dns-adguard
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - 'missingkey=error'
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
        values:
          chartVersion: ">=1.17.0"
          namespace: external-dns
  template:
    metadata:
      name: 'external-dns-adguard-{{.name | slugify}}'
      labels:
        app.kubernetes.io/component: argocd-application
        homelab.wojoinc.xyz/app-group: 'media'
    spec:
      project: default
      sources:
        - repoURL: https://kubernetes-sigs.github.io/external-dns/
          targetRevision: '{{.values.chartVersion}}'
          chart: external-dns
          helm:
            releaseName: external-dns-adguard
            valueFiles:
              - $values/argocd/app/external-dns-adguard/values/base/values.yaml
              - $values/argocd/app/external-dns-adguard/values/flavor/{{index .metadata.labels "cluster-flavor"}}/values.yaml
              - $values/argocd/app/external-dns-adguard/values/env/{{index .metadata.labels "cluster-environment"}}/values.yaml
              - $values/argocd/app/external-dns-adguard/values/cluster/{{.name}}/values.yaml
            skipCrds: false
            ignoreMissingValueFiles: true
        - repoURL: 'https://github.com/somerandow/homelab'
          targetRevision: main
          ref: values
        - repoURL: 'https://github.com/somerandow/homelab'
          targetRevision: main
          path: argocd/app/external-dns-adguard/base
          kustomize:
            components:
              - ../../../flavor/{{index .metadata.labels "cluster-flavor"}}/common
              - ../flavor/{{index .metadata.labels "cluster-flavor"}}/external-dns-adguard
              - ../../../env/{{index .metadata.labels "cluster-environment"}}/common
              - ../env/{{index .metadata.labels "cluster-environment"}}/external-dns-adguard
              - ../../../cluster/{{.name}}/common
              - ../cluster/{{.name}}/external-dns-adguard
            ignoreMissingComponents: true
      destination:
        server: '{{ .server }}'
        namespace: '{{ .values.namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
      ignoreDifferences: []

---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
components:
  - ../../feature/postgres
  - ../../../../../common/ingress-publish-internal
patches:
  - target:
      kind: Ingress
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: requests.wojoinc.xyz
      - op: add
        path: /spec/tls/0/hosts/0
        value: requests.wojoinc.xyz
  - target:
      kind: PodMonitor
    patch: |-
      - op: add
        path: /metadata/labels/monitoring.homelab.wojoinc.xyz~1enabled
        value: "true"
  - target:
      kind: Cluster
    patch: |-
      apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      metadata:
        name: not-used
      spec:
        bootstrap:
          initdb:
            secret:
              name: ombi-db-app
        storage:
          storageClass: rook-rbd-fast
          size: 5Gi

---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cnpg
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - 'missingkey=error'
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
        values:
          chartVersion: "0.27.1"
          namespace: cnpg
  template:
    metadata:
      name: 'cnpg-{{.name | slugify}}'
      labels:
        app.kubernetes.io/component: argocd-application
        homelab.wojoinc.xyz/app-group: 'infra'
    spec:
      project: default
      sources:
        - repoURL: https://cloudnative-pg.github.io/charts
          targetRevision: '{{.values.chartVersion}}'
          chart: cloudnative-pg
          helm:
            releaseName: cnpg
            valueFiles:
              - $values/argocd/app/cnpg/values/base/values.yaml
              - $values/argocd/app/cnpg/values/flavor/{{index .metadata.labels "cluster-flavor"}}/values.yaml
              - $values/argocd/app/cnpg/values/env/{{index .metadata.labels "cluster-environment"}}/values.yaml
              - $values/argocd/app/cnpg/values/cluster/{{.name}}/values.yaml
            skipCrds: false
            ignoreMissingValueFiles: true
        - repoURL: 'https://github.com/somerandow/homelab'
          targetRevision: main
          ref: values
        - repoURL: 'https://github.com/somerandow/homelab'
          targetRevision: main
          path: argocd/app/cnpg/base
          kustomize:
            components:
              - ../../../flavor/{{index .metadata.labels "cluster-flavor"}}
              - ../flavor/{{index .metadata.labels "cluster-flavor"}}/cnpg
              - ../../../env/{{index .metadata.labels "cluster-environment"}}
              - ../env/{{index .metadata.labels "cluster-environment"}}/cnpg
              - ../../../cluster/{{.name}}
              - ../cluster/{{.name}}/cnpg
            ignoreMissingComponents: true
      destination:
        server: '{{ .server }}'
        namespace: '{{ .values.namespace }}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: false
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
      ignoreDifferences: []

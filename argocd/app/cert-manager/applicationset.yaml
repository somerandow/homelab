---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cert-manager
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - 'missingkey=error'
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
        values:
          # renovate: datasource=docker depName=quay.io/jetstack/charts/cert-manager
          targetRevision: "v1.20.2"
          namespace: cert-manager
  template:
    metadata:
      name: 'cert-manager-{{.name | slugify}}'
      labels:
        app.kubernetes.io/component: argocd-application
        homelab.wojoinc.xyz/app-group: 'infra'
    spec:
      project: default
      sources:
        - repoURL: quay.io/jetstack/charts
          targetRevision: '{{ .values.targetRevision }}'
          chart: cert-manager
          helm:
            releaseName: cert-manager
            valueFiles:
              - $values/argocd/app/cert-manager/values/base/values.yaml
              - $values/argocd/app/cert-manager/values/flavor/{{index .metadata.labels "cluster-flavor"}}/values.yaml
              - $values/argocd/app/cert-manager/values/env/{{index .metadata.labels "cluster-environment"}}/values.yaml
              - $values/argocd/app/cert-manager/values/cluster/{{.name}}/values.yaml
            skipCrds: false
            ignoreMissingValueFiles: true
        - repoURL: 'https://github.com/somerandow/homelab'
          targetRevision: main
          ref: values
        - repoURL: 'https://github.com/somerandow/homelab'
          targetRevision: main
          path: argocd/app/cert-manager/base
          kustomize:
            components:
              - ../../../flavor/{{index .metadata.labels "cluster-flavor"}}
              - ../components/flavor/{{index .metadata.labels "cluster-flavor"}}
              - ../../../env/{{index .metadata.labels "cluster-environment"}}
              - ../components/env/{{index .metadata.labels "cluster-environment"}}
              - ../../../cluster/{{.name}}
              - ../components/cluster/{{.name}}
            ignoreMissingComponents: true
      destination:
        server: '{{.server}}'
        namespace: '{{.values.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
      ignoreDifferences: []

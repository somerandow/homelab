apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hass
spec:
  rules:
    - host: home.wojoinc.xyz
      http:
        paths:
          - backend:
              service:
                name: hass
                port:
                  number: 8123
            path: /
            pathType: Prefix
  tls:
    - hosts: []
      secretName: hass-tls

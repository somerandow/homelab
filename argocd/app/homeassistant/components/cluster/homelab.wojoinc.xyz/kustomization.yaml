---
apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component
components:
  - ../../../../../common/ingress-publish-internal
  - ../../../../../common/ingress-publish-external
resources:
  - networkattachmentdefinition.yaml
patches:
  - target:
      kind: Ingress
    patch: |-
      - op: add
        path: /spec/tls/0/hosts/0
        value: home.wojoinc.xyz
      - op: add
        path: /spec/rules/0/host
        value: home.wojoinc.xyz

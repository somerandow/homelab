---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
labels:
  - pairs:
      app.kubernetes.io/name: vikunja
      app.kubernetes.io/instance: vikunja
    includeTemplates: true
    includeSelectors: true
resources:
  - cluster.yaml
  - configmap.yaml
  - deployment.yaml
  - ingress.yaml
  - service.yaml
  - serviceaccount.yaml
  - vaultauths.yaml
  - vaultstaticsecrets.yaml

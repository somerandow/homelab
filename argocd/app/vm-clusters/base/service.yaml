---
apiVersion: v1
kind: Service
metadata:
  name: talos-api
  namespace: default
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - port: 50000
    protocol: TCP
    targetPort: 50000
  selector:
    kubevirt.io/vmpool: sandbox-cluster-talos
  sessionAffinity: None
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: default
  annotations:
    dns.homelab.wojoinc.xyz/publish-internal: ""
    internal.dns.homelab.wojoinc.xyz/hostname: api.sbx.wojoinc.xyz
spec:
  internalTrafficPolicy: Cluster
  externalTrafficPolicy: Cluster
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  ports:
    - port: 6443
      protocol: TCP
      targetPort: 6443
  selector:
    kubevirt.io/vmpool: sandbox-cluster-talos
  sessionAffinity: None
  type: LoadBalancer

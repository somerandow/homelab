---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: backup
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - 'missingkey=error'
  generators:
    - matrix:
        generators:
          - clusters:
              selector:
                matchLabels:
                  argocd.argoproj.io/secret-type: cluster
              values:
                targetRevision: "backups"
                namespace: velero
          - list:
              elements:
                - namespace: media
                - namespace: monitoring
  template:
    metadata:
      name: 'backup-{{.namespace}}-{{.name | slugify}}'
      labels:
        app.kubernetes.io/component: argocd-application
        homelab.wojoinc.xyz/app-group: 'media'
    spec:
      project: default
      sources:
        - repoURL: 'https://github.com/somerandow/homelab'
          targetRevision: '{{ .values.targetRevision }}'
          path: argocd/app/backup/base
          kustomize:
            patches:
              - target:
                  kind: Schedule
                patch: |-
                  - op: replace
                    path: /metadata/name
                    value: {{ .namespace }}
                  - op: add
                    path: /spec/template/includedNamespaces
                    value:
                      - {{ .namespace }}
            components:
              - ../../../flavor/{{index .metadata.labels "cluster-flavor"}}/common
              - ../../../flavor/{{index .metadata.labels "cluster-flavor"}}/backup
              - ../../../env/{{index .metadata.labels "cluster-environment"}}/common
              - ../../../env/{{index .metadata.labels "cluster-environment"}}/backup
              - ../../../clusters/{{.name}}/common
              - ../../../clusters/{{.name}}/backup
            ignoreMissingComponents: true
      destination:
        server: '{{ .server }}'
        namespace: '{{ .values.namespace }}'
      syncPolicy:
        automated:
          prune: false
          selfHeal: false
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
      ignoreDifferences: []

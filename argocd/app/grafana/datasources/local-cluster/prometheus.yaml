---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus
spec:
  uid: prometheus
  instanceSelector: {}
  datasource:
    name: prometheus
    type: prometheus
    access: proxy
    orgId: 1
    url: host:9090
    isDefault: true
    editable: false
    jsonData:
      tlsSkipVerify: true
      timeInterval: "20s"

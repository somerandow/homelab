---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: kube-prometheus-stack
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - 'missingkey=error'
  generators:
    - clusters:
        selector:
          matchLabels:
            cluster-environment: prod
            argocd.argoproj.io/secret-type: cluster
        values:
          # This may have issues due to multiple release types in same repo
          # renovate: datasource=github-releases depName=prometheus-community/helm-charts
          targetRevision: ">= 75.0.0"
          namespace: prometheus-operator
  template:
    metadata:
      name: 'kube-prometheus-stack-{{.name | slugify}}'
      labels:
        app.kubernetes.io/component: argocd-application
        app.kubernetes.io/part-of: '{{ index .metadata.labels "cluster-environment" }}'
        homelab.wojoinc.xyz/app-group: 'monitoring'
    spec:
      project: default
      sources:
        - repoURL: https://prometheus-community.github.io/helm-charts
          targetRevision: '{{.values.targetRevision}}'
          chart: kube-prometheus-stack
          helm:
            releaseName: "kube-prometheus-stack"
            skipCrds: true
            valueFiles:
              - $values/argocd/app/kube-prometheus-stack/values/base/values.yaml
              - $values/argocd/app/kube-prometheus-stack/values/flavor/{{index .metadata.labels "cluster-flavor"}}/values.yaml
              - $values/argocd/app/kube-prometheus-stack/values/env/{{index .metadata.labels "cluster-environment"}}/values.yaml
              - $values/argocd/app/kube-prometheus-stack/values/cluster/{{.name}}/values.yaml
            ignoreMissingValueFiles: true
        - repoURL: 'https://github.com/somerandow/homelab'
          targetRevision: main
          ref: values
        - repoURL: 'https://github.com/somerandow/homelab'
          targetRevision: main
          path: argocd/app/kube-prometheus-stack/base
          kustomize:
            components:
              - ../../../flavor/{{index .metadata.labels "cluster-flavor"}}
              - ../components/flavor/{{index .metadata.labels "cluster-flavor"}}
              - ../../../env/{{index .metadata.labels "cluster-environment"}}
              - ../components/env/{{index .metadata.labels "cluster-environment"}}
              - ../../../cluster/{{.name}}
              - ../components/cluster/{{.name}}
            ignoreMissingComponents: true
      destination:
        server: '{{.server}}'
        namespace: '{{.values.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
      ignoreDifferences: []

configuration:
  backupStorageLocation:
    - name: aws
      provider: "aws"
      bucket: "3e4e5504-3720-4854-8b72-39b44e116f47"
      accessMode: ReadWrite
      default: true
      credential:
        name: aws-credentials
        key: default
      config:
        region: us-east-1
        s3ForcePathStyle: "false"
        checksumAlgorithm: SHA256
  volumeSnapshotLocation:
    - name: default
      provider: csi
      config: {}
metrics:
  serviceMonitor:
    enabled: true
    additionalLabels:
      monitoring.homelab.wojoinc.xyz/enabled: "true"
  nodeAgentPodMonitor:
    enabled: true
    additionalLabels:
      monitoring.homelab.wojoinc.xyz/enabled: "true"
  prometheusRule:
    additionalLables:
      monitoring.homelab.wojoinc.xyz/enabled: "true"
nodeAgent:
  extraArgs: [ "--node-agent-configmap=velero-node-agent-cfg" ]
configMaps:
  node-agent-cfg:
    data:
      node-agent-config.json: |
        {
          "cachePVC": {
            "thresholdInGB": 5,
            "storageClass": "rook-rbd-fast"
          }
        }

---
apiVersion: k8s.mariadb.com/v1alpha1
kind: MariaDB
metadata:
  name: bookstack-db
spec:
  serviceAccountName: mariadb
  replicas: 3
  replication:
    enabled: true
  database: bookstack
  rootPasswordSecretKeyRef:
    name: bookstack-db-root
    key: password
    generate: false
  username: bookstack
  passwordSecretKeyRef:
    name: bookstack-db-user
    key: password
    generate: false
  port: 3306
  storage:
    size: 1Gi
  service:
    type: ClusterIP
  myCnf: |
    [mariadb]
    bind-address=*
    default_storage_engine=InnoDB
    binlog_format=row
    innodb_autoinc_lock_mode=2
    innodb_buffer_pool_size=1600M
    max_allowed_packet=256M
  resources:
    requests:
      cpu: 300m
      memory: 128Mi
    limits:
      memory: 1Gi
  metrics:
    enabled: true

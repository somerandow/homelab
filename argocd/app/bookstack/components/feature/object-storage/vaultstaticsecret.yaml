---
apiVersion: secrets.hashicorp.com/v1beta1
kind: VaultStaticSecret
metadata:
  name: bookstack-s3
spec:
  destination:
    create: true
    name: bookstack-s3
    overwrite: true
  hmacSecretData: true
  mount: ""
  path: bookstack/bookstack/s3
  refreshAfter: 5s
  type: kv-v2
  vaultAuthRef: bookstack

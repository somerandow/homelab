---
apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
spec:
  certificateRotateStrategy: {}
  configuration:
    developerConfiguration:
      featureGates:
        - HostDevices
    permittedHostDevices:
      usb:
        - externalResourceProvider: false
          resourceName: kubevirt.io/serial
          selectors:
            - vendor: 303a
              product: 831a
        - externalResourceProvider: false
          resourceName: kubevirt.io/zigbee
          selectors:
            - vendor: 1a86
              product: "7523"
    smbios:
      sku: "TalosCloud"
      version: "v0.1.0"
      manufacturer: "Talos Virtualization"
      product: "talosvm"
      family: "ccio"
    imagePullPolicy: IfNotPresent
  customizeComponents: {}
  imagePullPolicy: IfNotPresent
  workloadUpdateStrategy:
    workloadUpdateMethods:
      - LiveMigrate
  serviceMonitorNamespace: kubevirt

---
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: metrics-server
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions:
    - 'missingkey=error'
  generators:
    - clusters:
        selector:
          matchLabels:
            argocd.argoproj.io/secret-type: cluster
        values:
          # renovate: datasource=github-releases depName=kubernetes-sigs/metrics-server
          targetRevision: "v0.8.1"
          namespace: metrics-server
  template:
    metadata:
      name: 'metrics-server-{{.name | slugify}}'
      labels:
        app.kubernetes.io/component: argocd-application
        homelab.wojoinc.xyz/app-group: 'monitoring'
    spec:
      project: default
      sources:
        - repoURL: https://github.com/kubernetes-sigs/metrics-server
          targetRevision: '{{.values.targetRevision}}'
          path: "charts/metrics-server"
          helm:
            valueFiles:
              - $values/argocd/app/metrics-server/values/base/values.yaml
              - $values/argocd/app/metrics-server/values/flavor/{{index .metadata.labels "cluster-flavor"}}/values.yaml
              - $values/argocd/app/metrics-server/values/env/{{index .metadata.labels "cluster-environment"}}/values.yaml
              - $values/argocd/app/metrics-server/values/cluster/{{.name}}/values.yaml
            skipCrds: false
            ignoreMissingValueFiles: true
        - repoURL: 'https://github.com/somerandow/homelab'
          targetRevision: main
          ref: values
      destination:
        server: '{{.server}}'
        namespace: '{{.values.namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ApplyOutOfSyncOnly=true
          - ServerSideApply=true
          - RespectIgnoreDifferences=true
      ignoreDifferences: []

---
apiVersion: "k8s.cni.cncf.io/v1"
kind: NetworkAttachmentDefinition
metadata:
  name: iot-bridge
spec:
  config: |- 
    {
      "cniVersion": "0.3.1",
      "type": "bridge",
      "bridge": "br.105",
      "ipam": {
        "type": "static",
        "addresses": [
          {
            "address": "10.5.0.30/16",
            "gateway": "10.5.0.1"
          }
        ],
        "routes": [
          { "dst": "10.5.0.0/16" }
        ],
        "dns": {
          "nameservers" : ["10.5.0.1"],
          "domain": "wojoinc.xyz",
          "search": [ "wojoinc.xyz" ]
        }
      }
    }
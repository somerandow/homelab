---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: not-used
spec:
  template:
    spec:
      initContainers:
        - name: install-multus-binary
          command:
            - "/usr/src/multus-cni/bin/install_multus"
            - "-d"
            - "/host/opt/cni/bin"
            - "-t"
            - "thick"
        - name: install-cni-plugins
          image: docker.io/library/alpine:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /host/opt/cni/bin
              mountPropagation: Bidirectional
              name: cnibin
          command:
            - /bin/sh
          args:
            - "-c"
            - |
              cd /tmp;
              apk update && apk add curl;
              curl -fSsL https://github.com/containernetworking/plugins/releases/download/v1.9.1/cni-plugins-linux-amd64-v1.9.1.tgz | \
              tar -xzvf - && rm LICENSE README.md;
              cp ./* /host/opt/cni/bin;
              ls -la /host/opt/cni/bin
      containers:
        - name: kube-multus
          resources:
            limits:
              cpu: 300m
              memory: 300Mi
            requests:
              cpu: 100m
              memory: 100Mi
      resources:
        limits:
          cpu: 300m
          memory: 300Mi
        requests:
          cpu: 100m
          memory: 100Mi
      volumes:
        - name: host-run-netns
          hostPath:
            path: /var/run/netns/
